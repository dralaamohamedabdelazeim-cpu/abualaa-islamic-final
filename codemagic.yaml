workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          curl -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
